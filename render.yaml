services:
  - type: web
    name: riskoracle
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PRIVATE_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MOONSHOT_MODEL
        value: kimi-k3
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
